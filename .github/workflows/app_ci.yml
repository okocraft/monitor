name: App CI
on:
  push:
    paths: [ 'app/**', '.github/workflows/app_ci.yml' ]
  pull_request:
    paths: [ 'app/**', '.github/workflows/app_ci.yml' ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    services:
      mariadb:
        image: mariadb:12.3.2@sha256:628f228f0fd5913a220438693576b29b6fe4dc1fa0a1298c0e98579fae28635f
        ports:
          - "3306:3306"
        env:
          MYSQL_DATABASE: monitor_db
          MYSQL_ROOT_PASSWORD: monitor_pw
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONITOR_DB_HOST: 127.0.0.1
      MONITOR_DB_PORT: 3306
      MONITOR_DB_USER: root
      MONITOR_DB_PASSWORD: monitor_pw
      MONITOR_DB_NAME: monitor_db
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            app
            schema/database
      - name: "Set up Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: |
            app/go.sum
      - name: "Build"
        run: go build cmd/http/main.go
      - name: "Run test"
        run: go run gotest.tools/gotestsum@v1.12.3 --junitfile ~/test-results.xml
      - name: "Upload Results"
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: ${{ success() || failure() }}
        continue-on-error: true
        with:
          report_paths: ~/test-results.xml
          check_name: Test Report
